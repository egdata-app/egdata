<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Offline | egdata.app</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07090c;
        color: #f4f7fb;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 440px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #a9b4c2;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 24px;
        color: #f4f7fb;
        text-decoration-color: #5b8cff;
        text-underline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        egdata.app could not reach the network. Reconnect and reload to continue browsing the
        latest store data.
      </p>
      <a href="/">Try the homepage</a>
    </main>
  </body>
</html>
